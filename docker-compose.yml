# Sobe o coletor (build local a partir deste repo). Roda dentro da VPS do cliente.
# network_mode: host → alcança o MariaDB local em 127.0.0.1:3306 e faz a conexão de SAÍDA
# para o hub. Nenhuma porta de entrada é aberta.
#
#   cp .env.example .env   # preencha
#   docker compose --env-file .env up -d --build
#   docker compose logs -f

services:
  collector:
    image: dashcall-collector:latest
    container_name: dashcall-collector
    restart: unless-stopped
    network_mode: host
    env_file: .env
    # A imagem e construida em OUTRA maquina (dev/CI) e carregada na VPS via `docker load`
    # (a VPS nao baixa o SDK .NET ~1GB — so a imagem de runtime ~200MB). Fluxo:
    #   dev:  docker build -t dashcall-collector:latest . && docker save dashcall-collector:latest | gzip > col.tar.gz
    #   VPS:  gunzip -c col.tar.gz | docker load && docker compose --env-file .env up -d
    # Para buildar localmente (VPS com espaco de sobra): docker build -t dashcall-collector:latest . primeiro.
